<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>

    <!-- Bulma -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

    <!-- FontAwesome (iconos) -->
    <script src="https://kit.fontawesome.com/a2e0e6ad65.js" crossorigin="anonymous"></script>

    <!-- Tu CSS -->
    <link rel="stylesheet" href="../css/usuarios.css">
</head>

<body>
    <section class="section">
        <div class="container">
            <div class="box">
                <h1 class="title has-text-centered">Usuarios</h1>

                <!-- Nombre -->
                <div class="field">
                    <label class="label">Nombre completo</label>
                    <div class="control">
                        <input class="input" type="text" placeholder="Ingrese su nombre">
                    </div>
                </div>

                <!-- Celular -->
                <div class="field">
                    <label class="label">Número de celular</label>
                    <div class="control has-icons-left">
                        <input class="input" type="tel" placeholder="numero de celular">
                        <span class="icon is-small is-left">
                            <i class="fas fa-phone"></i>
                        </span>
                    </div>
                </div>

                <!-- Email -->
                <div class="field">
                    <label class="label">Email</label>
                    <div class="control has-icons-left">
                        <input class="input" type="email" placeholder="correo">
                        <span class="icon is-small is-left">
                            <i class="fas fa-envelope"></i>
                        </span>
                    </div>
                </div>

                <!-- Género -->
                <div class="field">
                    <label class="label">Género</label>
                    <div class="control">
                        <div class="select is-fullwidth">
                            <select>
                                <option>Seleccione</option>
                                <option>Hombre</option>
                                <option>Mujer</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Fecha -->
                <div class="field">
                    <label class="label">Fecha de nacimiento</label>
                    <div class="control">
                        <input class="input" type="date" />
                    </div>
                </div>

                <!-- Dirección -->
                <div class="field">
                    <label class="label">Dirección</label>
                    <div class="control">
                        <input class="input" type="text" placeholder="Ingrese su dirección">
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="field">
                    <label class="label">Contraseña</label>
                    <div class="control has-icons-left">
                        <input class="input" type="password" placeholder="********">
                        <span class="icon is-small is-left">
                            <i class="fas fa-lock"></i>
                        </span>
                    </div>
                </div>

                <!-- Botones -->
                <div class="field is-grouped is-justify-content-center">
                    <div class="control">
                        <button class="button is-link">Guardar</button>
                    </div>
                    <div class="control">
                        <button class="button is-light">Cancelar</button>
                    </div>
                </div>

            </div>
        </div>
    </section>
</body>

</html>
