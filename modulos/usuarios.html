<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Usuarios</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="../css/usuarios.css">
</head>

<body>

  

    <div class="logo-home">
        <a href="/index.html">
            <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="Home">
        </a>
    </div>

   

    <div class="container">

        <form class="box">

            <h1 class="title">REGISTRAR USUARIO</h1>

            <div class="field">
                <label class="label">Nombre completo</label>
                <div class="control">
                    <input class="input" type="text" placeholder="Ingrese su nombre completo">
                </div>
            </div>

            <div class="field">
                <label class="label">Email</label>
                <div class="control">
                    <input class="input" type="email" placeholder="Ingrese su email">
                </div>
            </div>

            <div class="field">
                <label class="label">Celular</label>
                <div class="control">
                    <input class="input" type="tel" placeholder="Ingrese su celular">
                </div>
            </div>

            <div class="field">
                <label class="label">Fecha de nacimiento</label>
                <div class="control">
                    <input class="input" type="date">
                </div>
            </div>

            <div class="field">
                <label class="label">Género</label>
                <div class="control">
                    <div class="select is-fullwidth">
                        <select>
                            <option>Masculino</option>
                            <option>Femenino</option>
                            <option>Otro</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="field">
                <label class="label">Dirección</label>
                <div class="control">
                    <input class="input" type="text" placeholder="Ingrese su dirección">
                </div>
            </div>

            <div class="field">
                <label class="label">Contraseña</label>
                <div class="control">
                    <input class="input" type="password" placeholder="Ingrese su contraseña">
                </div>
            </div>

            <div class="field">
                <div class="control">
                    <button class="button is-success is-fullwidth">
                        Registrar
                    </button>
                </div>
            </div>

        </form>

    </div>

</body>

</html>
