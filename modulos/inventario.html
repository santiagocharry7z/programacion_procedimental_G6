<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>inventario</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="../css/inventario.css">
</head>

<body>

<div class="container">
    
    <form class="box">

        <h2 class="title is-4">Formulario de Inventario</h2>

        <div class="field">
            <label class="label">Codigo_Producto</label>
            <div class="control">
                <input class="input" type="text" placeholder="Ingrese el código">
            </div>
        </div>

        <div class="field">
            <label class="label">Nombre_producto</label>
            <div class="control">
                <input class="input" type="text" placeholder="Ingrese el nombre">
            </div>
        </div>

        <div class="field">
            <label class="label">Precio_unitario</label>
            <div class="control">
                <input class="input" type="number" placeholder="Ingrese el precio">
            </div>
        </div>

        <div class="field">
            <label class="label">Cantidad_Producto</label>
            <div class="control">
                <input class="input" type="number" placeholder="Ingrese la cantidad">
            </div>
        </div>

        <div class="field">
            <label class="label">Marca_producto</label>
            <div class="control">
                <input class="input" type="text" placeholder="Ingrese la marca">
            </div>
        </div>

        <div class="field">
            <label class="label">Categoria_Producto</label>
            <div class="control">
                <input class="input" type="text" placeholder="Ingrese la categoría">
            </div>
        </div>

        <div class="field">
            <label class="label">Unidad_Medida</label>
            <div class="control">
                <input class="input" type="text" placeholder="Ingrese la unidad de medida">
            </div>
        </div>

        <div class="field">
            <div class="control">
                <button class="button is-primary">Guardar</button>
            </div>
        </div>
        <body>


    <div class="logo-home">
        <a href="/index.html">
            <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="Home">
        </a>
    </div>

</body>

    </form>

</div>
</body>

</html>
